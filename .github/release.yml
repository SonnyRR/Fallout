changelog:
  exclude:
    labels:
      - skip-changelog
      - dependencies
    authors:
      - dependabot
  categories:
    - title: "⚠️ Breaking Changes"
      labels:
        - breaking-change
    - title: "✨ New Features"
      labels:
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
    - title: "🔒 Security"
      labels:
        - security
    - title: "📦 Dependencies"
      labels:
        - dependencies
    - title: "📖 Documentation"
      labels:
        - documentation
    - title: "Other Changes"
